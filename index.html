<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration Form</title>
    <!--favicon-->
    <link rel="icon" href="https://images.seeklogo.com/logo-png/48/1/daily-dev-icon-logo-png_seeklogo-483914.png">
    <link rel="stylesheet" href="style.css">

    

</head>
<body>
    <h1>Course Registration Form</h1>

    <form action="https://www.amazon.in/">

            <fieldset>
                <legend>Personal Details</legend>
                <table>
                <tr>
                    <td><label for="fname">First Name*</label></td>
 <!--name="V.Name"  id="V.name" for Server Identification
 (this is a variable name given in the backend to store ur firstname)-->
                    <td><input 
                        name="fname"               
                        id="fname"
                        type="text" 
                        required 
                        placeholder="Ex:Priya"
                        maxlength="10">             <!--forlimitingtextinputlength-->         
                    <p class="tooltip">Enter your First Name</p>       <!-- tooltip= give extra information-->
                    </td>        
                </tr>
                <tr>
                    <td><label for="sname">Surname</label></td>
                    <td><input 
                        name="sname"
                        id="sname"
                        type ="text">
                        <p class="tooltip">Enter your SurName</p>
                   </td>
                </tr>
                <tr>
                    <td><label for="mobileno">Mobile Number*</label></td>
                    <td><input 
                        name="mobileno"
                        id="mobileno"
                        type="tel"
                        required></td>
                    <p class="tooltip">Enter your Mobile Number</p>
                </tr>
                <tr>
                    <td><label for="email">Email*</label>
                    <td><input type="email" id="email" required>
                        <p class="tooltip">Enter your Email</p>
                        <img class="correct"
                        src="https://media.istockphoto.com/id/691856234/vector/flat-round-check-mark-green-icon-button-tick-symbol-isolated-on-white-background.jpg?s=612x612&w=0&k=20&c=hXL5nXQ2UJlh4yzs2LyZC4GtctQG0fs-mk30GPPbhbQ="
                        alt="">
                        <img class="wrong"
                        src="https://img.freepik.com/free-vector/error-alert-button-symbol_24877-83749.jpg?semt=ais_hybrid&w=740&q=80"
                        alt="">
                    </td>
                </tr>
                <tr>
                    <td><label for="pass">Password</label></td>
                    <!--below command AUTO FILLS the confirm password-->
                    <td><input  
                        type="password" 
                        required
                        id="pass"
                        name="pass"
                        oninput="document.getElementById('cpass').value=this.value"></td>
                
                        <p class="tooltip">Enter your Password</p></td>
                </tr>
                <tr>
                    <!--confirm password AUTO FILLS from password-->
                    <td><label for="cpass">Confirm Password</label>
                    <td><input 
                        name="cpass"
                        type="password" 
                        id="cpass">
                    
                        <p class="tooltip">Enter your Confirm Password</p></td>
                </tr>
                <tr>
                    <td><label for="dob">Date of Birth</label></td>
                    <td><input 
                        name="dob"
                        id="dob"
                        type="date" required>
                        <p class="tooltip">Enter your D.O.B</p>
</td>
                </tr>
                <tr>
                    <td><label for="age">Age*</label></td>
                    <td><input 
                        name="age"
                        id="age"
                        type="number" min="18" max="65" 
                        required>
                        <p class="tooltip">Enter your Age</p>
                        <img class="correct"
                        src="https://media.istockphoto.com/id/691856234/vector/flat-round-check-mark-green-icon-button-tick-symbol-isolated-on-white-background.jpg?s=612x612&w=0&k=20&c=hXL5nXQ2UJlh4yzs2LyZC4GtctQG0fs-mk30GPPbhbQ="
                        alt="">
                        <img class="wrong"
                        src="https://img.freepik.com/free-vector/error-alert-button-symbol_24877-83749.jpg?semt=ais_hybrid&w=740&q=80"
                        alt="">
</td>
                </tr>
                <tr>
                    <td><label for="gender">Gender</label></td>
                    <td>
                        <input type="radio" name="gender"  value="male"/><label for="male">MALE</label>       
                        <input type="radio" name="gender" value="female" checked/><label for="female">FEMALE</label> 
                        <input type="radio" name="gender" value="others"/><label for="others">OTHERS</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="country">Select Country</label></td>
                    <td><select name="country" id="country">
                        <option value="INDIA" selected>INDIA</option> <!--by default india ;others also work-->
                        <option value="USA">USA</option>
                        <option value="UK">UK</option>
                        <option value="CHINA">CHINA</option>
                        </select>
    </td>
                </tr>
                <tr>
                    <td><label for="profilepic">Upload Picture</label></td>
                    <td><input type="file" name="profilepic"></td>
                </tr>
                </table>
            </fieldset>

            <fieldset>
                <legend>Course Details</legend>
                <table>
                <tr>
                    <td><label for="course">Select Course</label></td>
                    <td><select name="course" id="course">
            <option value="coreJava">Core Java</option>
            <option value="python for DataScience">Python for DataScience</option>
            <option value="full Stack in Java">Full Stack in Java</option>
            <option value="basic in AI">Basic in AI</option>
                         </select>
    </td>
                </tr>
                <tr>
<td>
    <label for="delivery">Delivery Mode</label></td>
<td>
<input type="checkbox" name="delivery" id="delivery" value="Online"><label for="Online">Online</label>
<input type="checkbox" name="delivery" id="delivery" value="Offline"><label for="Offline">Offline</label></td>
                </tr>
                <tr>
                    <td><label for="">Institute Name</label></td>
                    <td><input type="text">
                    <p class="tooltip">Enter your Institute Name</p>
                    </td>
                </tr>
                <tr>
                    <td><label for="">Comments</label></td>
                    <td><input type="text"></td>
                </tr>
                </table> 
               </fieldset> 
         
            <input type="clear" value="CLEAR FORM"><br>
            <input type="submit" value="SUBMIT">
         
    </form>
</body>
</html>
<!--when u submit the form it will create new url with the given data in server
URL: https://www.amazon.in/?fname=hi&sname=hi&mobileno=98&pass=9876&cpass=9876&dob=2026-02-04&age=18&gender=female&country=INDIA&profilepic=image+2.jpg&delivery=Online
 URL format:link ? id=name & id=surname &id=mobileno & etc....
 in backend if only pass& cpass are matched ,it will proceed further
 otherwise it will an error-->
